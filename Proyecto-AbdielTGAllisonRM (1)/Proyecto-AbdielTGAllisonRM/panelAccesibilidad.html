<div class="offcanvas offcanvas-end panel-accesibilidad" tabindex="-1" id="panelAccesibilidad" aria-labelledby="panelAccesibilidadLabel">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title" id="panelAccesibilidadLabel">Herramientas de accesibilidad</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
  </div>
  <div class="offcanvas-body">
    <p class="descripcion-accesibilidad">Personaliza la visualización del sitio según tus necesidades.</p>

    <div class="d-grid gap-2">
      <button class="btn-accesibilidad" id="aumentarTexto" type="button">
        <i class="bi bi-zoom-in"></i> Aumentar texto
      </button>

      <button class="btn-accesibilidad" id="disminuirTexto" type="button">
        <i class="bi bi-zoom-out"></i> Disminuir texto
      </button>

      <button class="btn-accesibilidad" id="toggleFuente" type="button">
        <i class="bi bi-fonts"></i> Fuente legible
      </button>

      <button class="btn-accesibilidad" id="contrasteAccesible" type="button">
      <i class="bi bi-circle-half"></i> Alto contraste
      </button>

      <button class="btn-accesibilidad btn-accesibilidad-reset" id="resetAccesibilidad" type="button">
        <i class="bi bi-arrow-counterclockwise"></i> Restablecer
      </button>
    </div>
  </div>
</div>
